name: CI

on: [push]

jobs:
  sast_scan:
    name: Run Bandit Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to latest version

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to latest version
        with:
          python-version: '3.8'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit scan
        # Added || true so the workflow doesn't fail if Bandit finds vulnerabilities
        run: bandit -r -lll -iii . -f json -o bandit-report.json || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-findings
          path: bandit-report.json

  image_scan:
    name: Build Image and Run Image Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        # Standard ubuntu-latest runners come with Docker pre-installed. 
        # Using a custom setup action is usually unnecessary.
        run: docker --version

      - name: Build Docker Image
        run: docker build -t myapp:latest .

      - name: Docker Scout Scan
        # Fixed the double "run:" key and combined commands
        run: |
          curl -sSfL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh -s --
          docker scout quickview myapp:latest
          docker scout cves myapp:latest
